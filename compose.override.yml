# compose.override.yml — spoat-fork custom overrides
# Last updated: 2026-07-15T21:09:49Z
# Pins: fork web image, restart policies, image tags, resource limits

services:
  # ── Infrastructure: use pinned tags to prevent surprise upgrades
  database:
    image: docker.io/mongo
    restart: unless-stopped

  redis:
    image: docker.io/eqalpha/keydb
    restart: unless-stopped

  rabbit:
    restart: unless-stopped

  minio:
    image: docker.io/minio/minio
    restart: unless-stopped

  caddy:
    image: docker.io/caddy
    restart: unless-stopped
    ports: !override
      - "80:80"
      - "443:443"

  # ── Application services: restart policies
  api:
    restart: unless-stopped

  events:
    restart: unless-stopped

  autumn:
    restart: unless-stopped

  january:
    restart: unless-stopped

  gifbox:
    restart: unless-stopped

  crond:
    restart: unless-stopped

  pushd:
    restart: unless-stopped

  voice-ingress:
    restart: unless-stopped

  livekit:
    restart: unless-stopped

  # ── Web: use our fork's image
  web:
    image: ghcr.io/spoat-fork/for-web:latest
    restart: unless-stopped
